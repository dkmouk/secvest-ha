type: markdown
title: Zonenübersicht
content: >-
  {% set zones = states.binary_sensor
    | selectattr('attributes.friendly_name', 'defined')
    | selectattr('attributes.friendly_name', 'search', 'Secvest ')
    | rejectattr('entity_id', 'search', 'available')
    | rejectattr('entity_id', 'search', 'any_zone')
    | rejectattr('entity_id', 'search', 'problem')
    | rejectattr('entity_id', 'search', 'batterie')
    | rejectattr('entity_id', 'search', 'battery')
    | rejectattr('entity_id', 'search', 'fault')
    | list %}
  {% set open_zones = zones | selectattr('state', 'eq', 'on') | list %} {% if
  open_zones | count == 0 %} ✅ <b>Keine offenen Kontakte</b> {% else %} ⚠️ <b>{{
  open_zones | count }} offene Kontakte</b> {% endif %} <br> <b>Offen: {{
  open_zones | count }} von {{ zones | count }} Melder</b> <br><br> <table
  style="width:100%;border-collapse:collapse;font-size:13px;"> <thead><tr> <th
  style="text-align:center;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.35);">Offen</th> <th
  style="text-align:left;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.35);">Name</th> <th
  style="text-align:right;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.35);">Zone</th> <th
  style="text-align:left;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.35);">Typ</th> <th
  style="text-align:center;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.35);">RSSI</th> <th
  style="text-align:center;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.35);">🔋</th> <th
  style="text-align:center;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.35);">📶</th> <th
  style="text-align:center;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.35);">Intern</th> <th
  style="text-align:center;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.35);">🛠️</th> </tr></thead><tbody> {% for z in zones |
  sort(attribute='attributes.friendly_name') %} {% set name =
  z.attributes.get('secvest_name') or z.attributes.get('zone_name') or
  z.attributes.friendly_name | replace('Secvest ', '') %} {% set zone_id =
  z.attributes.get('zone_id') or z.attributes.get('secvest_key') or '-' %} {%
  set typ = z.attributes.get('device_class') or z.attributes.get('zone_type') or
  '-' %} {% set rssi = z.attributes.get('rssi') or '-' %} {% set battery_ok =
  z.attributes.get('battery_ok') in [true, 'true', 'True'] %} {% set rf_ok =
  z.attributes.get('rf_ok') in [true, 'true', 'True'] %} {% set sabotage_ok =
  z.attributes.get('sabotage_ok') in [true, 'true', 'True'] %} <tr><td
  style="text-align:center;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.14);">{{ '🔴' if z.state == 'on' else '🟢' }}</td><td
  style="text-align:left;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.14);"><b>{{ name }}</b></td><td
  style="text-align:right;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.14);">{{ zone_id }}</td><td
  style="text-align:left;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.14);">{{ typ }}</td><td
  style="text-align:center;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.14);">{{ rssi }}</td><td
  style="text-align:center;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.14);">{{ '🟢' if battery_ok else '🔴' }}</td><td
  style="text-align:center;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.14);">{{ '🟢' if rf_ok else '🔴' }}</td><td
  style="text-align:center;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.14);">{{ '🟢' if z.attributes.get('inner') in [true, 'true',
  'True'] else '🔴' }}</td><td
  style="text-align:center;padding:6px;border-bottom:1px solid
  rgba(255,255,255,.14);">{{ '🟢' if sabotage_ok else '🔴' }}</td></tr> {%
  endfor %} </tbody></table> {% set problem_zones = zones |
  rejectattr('attributes.fault_count', 'eq', 0) | list %} {% if problem_zones |
  count > 0 %} <br><b>Aktuelle Meldungen:</b> <ul> {% for z in problem_zones %}
  <li><b>{{ z.attributes.get('secvest_name') or z.attributes.friendly_name
  }}</b>: {{ z.attributes.get('fault_labels', []) | join(', ') }}</li> {% endfor
  %} </ul> {% endif %}
